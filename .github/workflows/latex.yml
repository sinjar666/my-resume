name: Build LaTeX document
on:
  push:
    branches:
      - master
jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v2
      - name: Create and Push Tag
        id: generate_tag
        run: |
          # Generate timestamp (e.g., 20231027-143005)
          TAG_NAME="v$(date +'%Y%m%d-%H%M%S')"
          echo "Creating tag: $TAG_NAME"
          echo "new_tag=$TAG_NAME" >> $GITHUB_OUTPUT
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git tag $TAG_NAME
          git push origin $TAG_NAME
      - name: Compile LaTeX document
        uses: dante-ev/latex-action@latest
        with:
          working_directory: latex
          root_file: resume.tex
      - name: Upload PDF file
        uses: actions/upload-artifact@v6
        with:
          name: PDF
          path: latex/resume.pdf
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.generate_tag.outputs.new_tag }}
          # Optional: ensure notes match the custom tag
          name: Release ${{ steps.generate_tag.outputs.new_tag }}
          generate_release_notes: true
          files: latex/resume.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
